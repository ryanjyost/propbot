# Load project-root .env as Java properties (KEY=value). Lets ./mvnw spring-boot:run see
# secrets without `export` in the shell (plain `source .env` does not pass vars to child processes).
spring.config.import=optional:file:.env[.properties]
spring.application.name=propbot
server.port=${PORT:8080}

# Colors: %clr requires Spring Boot's Logback setup; force ANSI when Maven/Cursor hides TTY detection.
spring.output.ansi.enabled=always
# No timestamp or level — logger (cyan), then message; %n%n after event for spacing (see AppLog javadoc).
logging.pattern.console=%clr(%-50.50logger{50}){cyan}:%n%msg%n%wEx%n%n

# Pretty-print JSON written by Spring/Jackson (e.g. @ResponseBody). Does not change plain-text log lines.
spring.jackson.serialization.indent_output=true

groupme.access-token=${GROUPME_ACCESS_TOKEN:}
groupme.bot-id=${GROUPME_BOT_ID:}
groupme.group-id=${GROUPME_GROUP_ID:}
# Official base for likes/reactions: https://dev.groupme.com/docs/v3 — avoid /v7 unless you know the route exists.
groupme.api-base-url=${GROUPME_API_BASE_URL:https://api.groupme.com/v3}
groupme.push-user-id=${GROUPME_PUSH_USER_ID:${GROUPME_USER_ID:}}
groupme.push-gateway-url=${GROUPME_PUSH_GATEWAY_URL:wss://push.groupme.com/faye}

google.sheets.spreadsheet-id=${GOOGLE_SHEETS_SPREADSHEET_ID:}
google.sheets.sheet-name=${GOOGLE_SHEETS_SHEET_NAME:Sheet1}
google.sheets.per-bet-sheet-name=${GOOGLE_SHEETS_PER_BET_SHEET_NAME:Per_Person}
google.sheets.access-token=${GOOGLE_SHEETS_ACCESS_TOKEN:}
google.sheets.credentials-path=${GOOGLE_SHEETS_CREDENTIALS_PATH:${GOOGLE_APPLICATION_CREDENTIALS:}}
google.sheets.use-application-default-credentials=${GOOGLE_SHEETS_USE_ADC:false}
google.sheets.api-base-url=${GOOGLE_SHEETS_API_BASE_URL:https://sheets.googleapis.com/v4}

# Gemini auth: API key only.
gemini.model=${GEMINI_MODEL:gemini-2.5-flash-lite}
gemini.api-key=${GEMINI_API_KEY:}
