# Load project-root .env as Java properties (KEY=value). Lets ./mvnw spring-boot:run see
# secrets without `export` in the shell (plain `source .env` does not pass vars to child processes).
spring.config.import=optional:file:.env[.properties]
spring.application.name=propbot
server.port=${PORT:8080}

# Colors: %clr requires Spring Boot's Logback setup; force ANSI when Maven/Cursor hides TTY detection.
spring.output.ansi.enabled=always
# No timestamp or level — logger (cyan), then message; %n%n after event for spacing (see AppLog javadoc).
logging.pattern.console=%clr(%-50.50logger{50}){cyan}:%n%msg%n%wEx%n%n

groupme.access-token=${GROUPME_ACCESS_TOKEN:}
groupme.bot-id=${GROUPME_BOT_ID:}
groupme.group-id=${GROUPME_GROUP_ID:}
# Official base for likes/reactions: https://dev.groupme.com/docs/v3 — avoid /v7 unless you know the route exists.
groupme.api-base-url=${GROUPME_API_BASE_URL:https://api.groupme.com/v3}
groupme.push-user-id=${GROUPME_PUSH_USER_ID:}
groupme.push-gateway-url=${GROUPME_PUSH_GATEWAY_URL:wss://push.groupme.com/faye}
